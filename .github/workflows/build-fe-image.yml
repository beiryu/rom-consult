name: Build And Push Frontend Image

on:
  push:
    branches:
      - main
    paths:
      - "rom-consult-fe/**"
      - ".github/workflows/build-fe-image.yml"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "NEXT_PUBLIC_API_BASE_URL at build time"
        required: false
        default: "/api"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rom-consult-fe
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./rom-consult-fe
          file: ./rom-consult-fe/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ github.event.inputs.api_base_url || '/api' }}
