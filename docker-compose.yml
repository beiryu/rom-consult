services:
  nginx:
    image: nginx:alpine
    container_name: romconsult-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - romconsult-network

  frontend:
    build:
      context: ./rom-consult-fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    image: romconsult-frontend
    container_name: romconsult-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-/api}
      - PORT=3000
    depends_on:
      - backend
    networks:
      - romconsult-network

  backend:
    build:
      context: ./rom-consult-be
      dockerfile: Dockerfile
    image: romconsult-backend
    container_name: romconsult-backend
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./rom-consult-be/.env.production
    environment:
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: 3001
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLE_TLS: "false"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-password}
      # Prisma reads DATABASE_URL from env.
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-master123}@postgres:5432/${POSTGRES_DB:-postgres}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - romconsult-network

  postgres:
    image: postgres:16-alpine
    container_name: romconsult-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-master123}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - romconsult-postgres-data:/var/lib/postgresql/data
    networks:
      - romconsult-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: romconsult-redis
    restart: unless-stopped
    expose:
      - "6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-password}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-redis-password}
    volumes:
      - romconsult-redis-data:/data
    networks:
      - romconsult-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD:-redis-password}' ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  romconsult-network:
    driver: bridge

volumes:
  romconsult-postgres-data:
  romconsult-redis-data:
